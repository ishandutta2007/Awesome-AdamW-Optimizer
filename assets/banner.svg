<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Accent Neon Gradients -->
    <linearGradient id="neonCyanBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Decorative Abstract Geometric Shapes -->
  <circle cx="950" cy="150" r="250" fill="url(#neonPurple)" opacity="0.15" filter="url(#glow)" />
  <circle cx="200" cy="300" r="180" fill="url(#neonCyanBlue)" opacity="0.1" filter="url(#glow)" />

  <!-- Computational Nodes / Connections (Network theme) -->
  <g opacity="0.25" stroke="#4facfe" stroke-width="1.5">
    <line x1="100" y1="80" x2="250" y2="180" />
    <line x1="250" y1="180" x2="200" y2="300" />
    <line x1="250" y1="180" x2="400" y2="120" />
    <line x1="400" y1="120" x2="550" y2="200" />
    <line x1="900" y1="100" x2="1050" y2="150" />
    <line x1="1050" y1="150" x2="1000" y2="280" />
  </g>
  <g fill="#00f2fe">
    <circle cx="100" cy="80" r="5" />
    <circle cx="250" cy="180" r="7" />
    <circle cx="200" cy="300" r="4" />
    <circle cx="400" cy="120" r="6" />
    <circle cx="550" cy="200" r="5" />
    <circle cx="900" cy="100" r="4" />
    <circle cx="1050" cy="150" r="6" />
    <circle cx="1000" cy="280" r="5" />
  </g>

  <!-- Typography -->
  <text x="600" y="160" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="70" font-weight="900" fill="url(#neonCyanBlue)" letter-spacing="4">
    AWESOME ADAMW
  </text>
  
  <text x="600" y="230" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="8" opacity="0.9">
    OPTIMIZER RESOURCES
  </text>

  <text x="600" y="280" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="400" fill="#a1a1aa" letter-spacing="2">
    Evolution • Mathematical Variants • Memory Formats • Practical Engineering
  </text>

  <!-- Accent Border Line -->
  <rect x="20" y="20" width="1160" height="360" fill="none" stroke="url(#neonCyanBlue)" stroke-width="1.5" rx="10" opacity="0.2" />
</svg>
